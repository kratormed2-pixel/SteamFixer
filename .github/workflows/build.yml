name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter

      - name: Crear EXE (Modo Admin + Interfaz Moderna)
        run: |
          pyinstaller --noconfirm --onefile --windowed --uac-admin --collect-all customtkinter steam_fixer.py

      - name: Subir ejecutable (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: SteamFixer-Programa
          path: dist/steam_fixer.exe
